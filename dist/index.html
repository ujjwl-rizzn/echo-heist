<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-adsense-account" content="ca-pub-6967018953057648">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>ECHO HEIST</title>
  <style>
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background: #000 !important;
      overflow: hidden !important;
    }
    body {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      right: 0 !important; bottom: 0 !important;
      touch-action: none !important;
    }
    #canvas-wrapper {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      background: #000 !important; overflow: hidden !important;
    }
    /* Base canvas style — JS will keep overriding inline styles */
    #canvas {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      display: block !important;
      outline: none !important; border: none !important;
      background: #000 !important;
    }
    #status {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; visibility: hidden;
    }
    #status-splash {
      max-width: 200px; max-height: 200px; object-fit: contain;
    }
    #status-splash.show-image--false  { display: none; }
    #status-splash.fullsize--true     { width: 100vw; height: 100vh; max-width: none; max-height: none; }
    #status-splash.use-filter--false  { image-rendering: pixelated; }
    #status-progress {
      display: none; position: fixed;
      bottom: 10%; left: 15%; width: 70%; height: 5px;
      border-radius: 3px; accent-color: #00e5ff;
    }
    #status-notice {
      display: none; position: fixed; bottom: 8%;
      left: 1rem; right: 1rem;
      background: rgba(80,20,30,0.96); border: 1px solid #9b3943;
      border-radius: 6px; color: #eee;
      font-family: sans-serif; font-size: 13px;
      line-height: 1.5; padding: 1rem;
      text-align: center; z-index: 1001;
    }
  </style>
  <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png">
  <link rel="apple-touch-icon" href="index.apple-touch-icon.png">
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="canvas" tabindex="0">Your browser does not support canvas.</canvas>
  </div>
  <div id="status">
    <img id="status-splash" class="show-image--true fullsize--false use-filter--true"
         src="index.png" alt="Loading Echo Heist">
    <progress id="status-progress"></progress>
    <div id="status-notice"></div>
  </div>
  <noscript>This game requires JavaScript.</noscript>
  <script src="index.js"></script>
  <script>
  (function () {
    'use strict';

    var canvas  = document.getElementById('canvas');
    var wrapper = document.getElementById('canvas-wrapper');

    // ── THE KEY FIX ─────────────────────────────────────────────
    // Godot calls canvas.style.width = "Xpx" and canvas.style.height = "Ypx"
    // after startup, overriding our CSS. We use MutationObserver to
    // immediately undo that and restore true fullscreen dimensions.

    function getVW() { return window.innerWidth  || document.documentElement.clientWidth; }
    function getVH() { return window.innerHeight || document.documentElement.clientHeight; }

    function lockCanvas() {
      var w = getVW();
      var h = getVH();
      // Force inline style directly — highest specificity wins
      canvas.style.cssText =
        'position:absolute;top:0;left:0;' +
        'width:'  + w + 'px;' +
        'height:' + h + 'px;' +
        'display:block;outline:none;border:none;background:#000;' +
        'max-width:none;max-height:none;';
      wrapper.style.cssText =
        'position:fixed;top:0;left:0;' +
        'width:'  + w + 'px;' +
        'height:' + h + 'px;' +
        'overflow:hidden;background:#000;';
    }

    // Run now before anything else
    lockCanvas();

    // MutationObserver: every time Godot mutates canvas style → re-lock
    var _blocked = false;
    if (window.MutationObserver) {
      var obs = new MutationObserver(function () {
        if (_blocked) return;
        _blocked = true;            // prevent re-entry loop
        lockCanvas();
        _blocked = false;
      });
      obs.observe(canvas, { attributes: true, attributeFilter: ['style', 'width', 'height'] });
    }

    // Also re-lock on resize and orientation change
    function onResize() {
      lockCanvas();
    }
    window.addEventListener('resize',            onResize, { passive: true });
    window.addEventListener('orientationchange', function () {
      // Fire multiple times — browser takes time to settle
      setTimeout(lockCanvas,  50);
      setTimeout(lockCanvas, 200);
      setTimeout(lockCanvas, 600);
    }, { passive: true });

    // iOS Safari: push away address bar
    window.addEventListener('load', function () {
      window.scrollTo(0, 1);
      setTimeout(lockCanvas, 300);
    }, { passive: true });

    // ── Status / loading ─────────────────────────────────────────
    var statusEl   = document.getElementById('status');
    var progressEl = document.getElementById('status-progress');
    var noticeEl   = document.getElementById('status-notice');
    var initializing = true;
    var curMode      = '';

    function setMode(mode) {
      if (curMode === mode || !initializing) return;
      if (mode === 'hidden') {
        statusEl.remove();
        initializing = false;
        lockCanvas();
        setTimeout(lockCanvas, 200);
        return;
      }
      statusEl.style.visibility = 'visible';
      progressEl.style.display  = mode === 'progress' ? 'block' : 'none';
      noticeEl.style.display    = mode === 'notice'   ? 'block' : 'none';
      curMode = mode;
    }

    function showError(err) {
      console.error(err);
      var msg = err instanceof Error ? err.message : String(err) || 'Unknown error.';
      noticeEl.innerHTML = '';
      msg.split('\n').forEach(function (l) {
        noticeEl.appendChild(document.createTextNode(l));
        noticeEl.appendChild(document.createElement('br'));
      });
      setMode('notice');
      initializing = false;
    }

    // ── Godot engine boot ────────────────────────────────────────
    var GODOT_CONFIG = {
      args:                              [],
      canvasResizePolicy:                2,
      emscriptenPoolSize:                8,
      ensureCrossOriginIsolationHeaders: true,
      executable:                        'index',
      experimentalVK:                    false,
      fileSizes: { 'index.pck': 51044, 'index.wasm': 37695054 },
      focusCanvas:                       true,
      gdextensionLibs:                   []
    };
    var THREADS = false;
    var engine;
    try { engine = new Engine(GODOT_CONFIG); }
    catch (e) { showError('Engine init failed: ' + e); return; }

    var missing = Engine.getMissingFeatures({ threads: THREADS });
    if (missing.length) {
      if (GODOT_CONFIG.serviceWorker && GODOT_CONFIG.ensureCrossOriginIsolationHeaders
          && 'serviceWorker' in navigator) {
        var swp;
        try { swp = navigator.serviceWorker.getRegistration(); }
        catch (e) { swp = Promise.reject(e); }
        Promise.race([
          swp.then(function (r) {
            if (r) return Promise.reject(new Error('SW exists'));
            return engine.installServiceWorker();
          }),
          new Promise(function (res) { setTimeout(res, 2000); })
        ]).then(function () { location.reload(); })
          .catch(function (e) { console.warn('SW failed:', e); });
      } else {
        showError('Missing features:\n' + missing.join('\n'));
      }
    } else {
      setMode('progress');
      engine.startGame({
        onProgress: function (cur, tot) {
          if (cur > 0 && tot > 0) { progressEl.value = cur; progressEl.max = tot; }
          else { progressEl.removeAttribute('value'); progressEl.removeAttribute('max'); }
        }
      }).then(function () {
        setMode('hidden');
        // Final fullscreen lock after Godot renders first frame
        setTimeout(lockCanvas, 100);
        setTimeout(lockCanvas, 800);
      }).catch(showError);
    }

  }());
  </script>
</body>
</html>
