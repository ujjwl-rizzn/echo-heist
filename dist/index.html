<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ✅ AdSense publisher meta — DO NOT REMOVE -->
  <meta name="google-adsense-account" content="ca-pub-6967018953057648">
  <meta charset="utf-8">
  <!-- ✅ Mobile viewport fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ECHO HEIST</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      background: #000;
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      max-width: 100vw;
      max-height: 100vh;
      max-height: -webkit-fill-available;
      outline: none;
      border: none;
      background: #000;
    }

    #canvas:focus { outline: none; }

    #status {
      position: fixed;
      inset: 0;
      background: #050a0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      z-index: 100;
    }

    #status-splash {
      max-height: 60%;
      max-width: 60%;
      object-fit: contain;
    }

    #status-splash.show-image--false { display: none; }
    #status-splash.fullsize--true { height: 100%; width: 100%; object-fit: contain; }
    #status-splash.use-filter--false { image-rendering: pixelated; }

    #status-progress {
      display: none;
      position: fixed;
      bottom: 10%;
      left: 25%;
      right: 25%;
      width: 50%;
      height: 6px;
      border-radius: 3px;
      accent-color: #00e5ff;
    }

    #status-notice {
      display: none;
      position: fixed;
      bottom: 10%;
      left: 1rem;
      right: 1rem;
      background: #5b3943;
      border-radius: 0.5rem;
      border: 1px solid #9b3943;
      color: #e0e0e0;
      font-family: 'Noto Sans', Arial, sans-serif;
      line-height: 1.4;
      padding: 1rem;
      text-align: center;
      z-index: 200;
    }
  </style>

  <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png">
  <link rel="apple-touch-icon" href="index.apple-touch-icon.png">
</head>

<body>
  <canvas id="canvas">Your browser does not support the canvas element.</canvas>
  <noscript>This game requires JavaScript.</noscript>
  <div id="status">
    <img id="status-splash" class="show-image--true fullsize--false use-filter--true" src="index.png" alt="Echo Heist loading">
    <progress id="status-progress"></progress>
    <div id="status-notice"></div>
  </div>

  <script src="index.js"></script>
  <script>
    const GODOT_CONFIG = {
      "args": [],
      "canvasResizePolicy": 2,
      "emscriptenPoolSize": 8,
      "ensureCrossOriginIsolationHeaders": true,
      "executable": "index",
      "experimentalVK": false,
      "fileSizes": { "index.pck": 51044, "index.wasm": 37695054 },
      "focusCanvas": true,
      "gdextensionLibs": [],
      "godotPoolSize": 4
    };
    const GODOT_THREADS_ENABLED = false;
    const engine = new Engine(GODOT_CONFIG);

    function resizeCanvas() {
      const c = document.getElementById('canvas');
      if (!c) return;
      c.style.width  = window.innerWidth  + 'px';
      c.style.height = window.innerHeight + 'px';
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', function() { setTimeout(resizeCanvas, 200); });
    window.addEventListener('load', function() { setTimeout(function() { window.scrollTo(0,1); resizeCanvas(); }, 100); });

    (function () {
      const statusOverlay  = document.getElementById('status');
      const statusProgress = document.getElementById('status-progress');
      const statusNotice   = document.getElementById('status-notice');
      let initializing = true, statusMode = '';

      function setStatusMode(mode) {
        if (statusMode === mode || !initializing) return;
        if (mode === 'hidden') { statusOverlay.remove(); initializing = false; resizeCanvas(); return; }
        statusOverlay.style.visibility = 'visible';
        statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
        statusNotice.style.display   = mode === 'notice'   ? 'block' : 'none';
        statusMode = mode;
      }

      function setStatusNotice(text) {
        statusNotice.innerHTML = '';
        text.split('\n').forEach(function(line) {
          statusNotice.appendChild(document.createTextNode(line));
          statusNotice.appendChild(document.createElement('br'));
        });
      }

      function displayFailureNotice(err) {
        console.error(err);
        setStatusNotice(err instanceof Error ? err.message : typeof err === 'string' ? err : 'An unknown error occurred.');
        setStatusMode('notice');
        initializing = false;
      }

      const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
      if (missing.length !== 0) {
        if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
          let swp;
          try { swp = navigator.serviceWorker.getRegistration(); }
          catch(e) { swp = Promise.reject(new Error('SW failed.')); }
          Promise.race([
            swp.then(function(r) { if(r!=null) return Promise.reject(new Error('SW exists.')); return r; }).then(function(){ return engine.installServiceWorker(); }),
            new Promise(function(resolve){ setTimeout(resolve,2000); })
          ]).then(function(){ window.location.reload(); }).catch(function(e){ console.error('SW err:',e); });
        } else {
          displayFailureNotice('Error\nThe following features required to run Godot projects on the Web are missing:\n' + missing.join('\n'));
        }
      } else {
        setStatusMode('progress');
        engine.startGame({
          'onProgress': function(current, total) {
            if (current>0 && total>0) { statusProgress.value=current; statusProgress.max=total; }
            else { statusProgress.removeAttribute('value'); statusProgress.removeAttribute('max'); }
          }
        }).then(function(){ setStatusMode('hidden'); }, displayFailureNotice);
      }
    }());
  </script>
</body>
</html>
